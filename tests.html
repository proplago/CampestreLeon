<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Fixtures del motor — PlaGolf</title>
<style>
  body{font-family:ui-monospace,Consolas,monospace;font-size:13px;padding:18px;background:#fafaf7;color:#1b211d}
  h1{font-size:17px;margin:0 0 4px} .sub{color:#6e776f;margin-bottom:14px}
  .ok{color:#0a6a3a}.fail{color:#c1272d;font-weight:bold}.sec{margin-top:14px;font-weight:bold;color:#0e5230}
  #sum{margin-top:18px;padding:10px;border-radius:8px;font-weight:bold}
  .allok{background:#e8f2ec;color:#0a6a3a}.bad{background:#fbeaea;color:#c1272d}
</style>
</head>
<body>
<h1>Fixtures del motor de rayas</h1>
<div class="sub">Carga el motor REAL de index.html (sin UI) y verifica cada apuesta con días sintéticos. Regla de oro: todo día cuadra en cero.</div>
<div id="out">Cargando…</div>
<div id="sum"></div>
<script>
window.__TEST__ = true;                       // index.html NO corre App.init() con esta bandera
window.__RESULTS__ = {ready:false, pass:0, fail:0, fails:[]};

// Pares del Campestre por índice 0..17 (SI: ver courseCampestre en index.html)
const PARS=[4,4,5,3,4,4,3,4,5,4,4,5,3,4,4,3,5,4];   // par-3: idx 3,6,12,15 · front 36 · back 36
let _seq=0, _lines=[];
const line=(c,t)=>_lines.push('<div class="'+c+'">'+t+'</div>');
const sec=t=>line('sec','— '+t+' —');
function t(name,cond,detail){ const R=window.__RESULTS__;
  if(cond){ R.pass++; line('ok','✓ '+name); }
  else { R.fail++; R.fails.push(name+(detail!==undefined?(' :: '+detail):'')); line('fail','✗ '+name+(detail!==undefined?(' — obtuve: '+detail):'')); } }
const flush=()=>{ document.getElementById('out').innerHTML=_lines.join('');
  const R=window.__RESULTS__, s=document.getElementById('sum');
  s.className=R.fail?'bad':'allok'; s.textContent=(R.fail?'✗ ':'✓ ')+R.pass+' pasan · '+R.fail+' fallan'; };

async function main(){
  const html=await (await fetch('index.html?_t='+Date.now(),{cache:'no-store'})).text();
  const code=html.match(/<script>([\s\S]*)<\/script>/)[1];
  (new Function(code+';window.App=App;'))();
  const T=window.App.__test;
  const DEF=JSON.parse(JSON.stringify({units:T.getState().units, castigos:T.getState().castigos}));

  // ---- helpers de fixtures ----
  const gross=(mods,nine)=>{ const g=PARS.slice(); if(nine){for(let i=9;i<18;i++)g[i]=0;} if(mods)Object.keys(mods).forEach(k=>g[+k]=mods[k]); return g; };
  const sc=o=>Object.assign({gross:PARS.slice(),putts:Array(18).fill(null),oyes:{},units:{},cast:{}},o||{});
  const day=o=>{ _seq++; return Object.assign({id:'fx'+_seq,date:'2026-06-26',label:'F'+_seq,courseId:'campestre',start:1,holes:18,doubles:{},closed:true,salidas:[],scores:{}},o); };
  const reset=st=>T.setState(Object.assign({players:[],days:[],currentDayId:null,ventajas:{},rayaPairs:{},rayaValue:20,maxWeekday:6,maxWeekend:5,
    units:JSON.parse(JSON.stringify(DEF.units)),castigos:JSON.parse(JSON.stringify(DEF.castigos))},st));
  const P=(id,n)=>({id,name:n,guest:false});
  const row=(res,id)=>res.rows.find(r=>r.id===id);
  const pm=(res,a,b)=>((res.pm[a]&&res.pm[a][b])||0);
  const Z=Array(18).fill(0);

  // ============ F1 · Básico: 18 hoyos, 3 jugadores, 1 birdie ============
  sec('F1 básico (3 jugadores, birdie de A en hoyo 1)');
  {
    const d=day({playing:['pa','pb','pc'],salidas:[['pa','pb','pc']],
      scores:{pa:sc({gross:gross({0:3})}),pb:sc(),pc:sc()}});
    reset({players:[P('pa','Ana A'),P('pb','Beto B'),P('pc','Caro C')],days:[d],currentDayId:d.id});
    const res=T.computeDay(d), a=row(res,'pa'), b=row(res,'pb'), c=row(res,'pc');
    t('cuadra en cero (sum===0)',res.sum===0,res.sum);
    t('A hoyos +2',a.hoyos===2,a.hoyos);
    t('A unidades +2 (birdie vs 2 rivales)',a.unidades===2,a.unidades);
    t('A medal +4 (1ª9 y 18, vs 2 rivales)',a.medal===4,a.medal);
    t('A total +8 · pesos +160',a.total===8&&a.pesos===160,a.total+'/'+a.pesos);
    t('B y C total −4 cada uno',b.total===-4&&c.total===-4,b.total+'/'+c.total);
    t('uList registra el birdie',a.uList.birdie===1,JSON.stringify(a.uList));
    t('PM antisimétrica (A,B)=4=−(B,A)',pm(res,'pa','pb')===4&&pm(res,'pb','pa')===-4,pm(res,'pa','pb'));
    t('h2h(A,B).net===4 coincide con PM',T.h2h(d,'pa','pb').net===4,T.h2h(d,'pa','pb').net);
    const ms=T.medalSeg(d,'pa','pb',Z,Z);
    t('medalSeg: gana 1ª9 y total, empata 2ª9',ms.first.winner==='a'&&ms.second.winner===null&&ms.total.winner==='a',JSON.stringify(ms));
  }

  // ============ F2 · Ventajas: B recibe 3 golpes de A ============
  sec('F2 ventajas (B recibe 3 de A; caen por SI en orden de juego)');
  {
    const d=day({playing:['pa','pb'],salidas:[['pa','pb']],scores:{pa:sc(),pb:sc()}});
    reset({players:[P('pa','Ana A'),P('pb','Beto B')],days:[d],currentDayId:d.id,ventajas:{'pa>pb':3}});
    t('received(B,A)===3',T.received('pb','pa')===3,T.received('pb','pa'));
    const al=T.allocate(3,d);
    t('allocate: golpes en SI 1,2,3 (idx 1,9,5)',al[1]===1&&al[9]===1&&al[5]===1&&al.reduce((s,x)=>s+x,0)===3,JSON.stringify(al));
    const res=T.computeDay(d), b=row(res,'pb');
    t('cuadra en cero',res.sum===0,res.sum);
    t('B hoyos +3 (gana los 3 hoyos con golpe)',b.hoyos===3,b.hoyos);
    t('B medal +3 (1ª9, 2ª9 y total netos)',b.medal===3,b.medal);
    t('B total +6, A −6',b.total===6&&row(res,'pa').total===-6,b.total);
  }

  // ============ F3 · Salida del hoyo 10 ============
  sec('F3 salida del 10 (la 1ª vuelta es 10–18; hoyo 1 es de la 2ª)');
  {
    const d=day({start:10,playing:['pa','pb'],salidas:[['pa','pb']],
      scores:{pa:sc({gross:gross({0:3})}),pb:sc()}});
    reset({players:[P('pa','Ana A'),P('pb','Beto B')],days:[d],currentDayId:d.id});
    t('playOrder empieza en idx 9 (hoyo 10)',T.playOrder(d)[0]===9,T.playOrder(d)[0]);
    t('orderIdx(hoyo1)===9 · isSecond(hoyo1)',T.orderIdx(d,0)===9&&T.isSecond(d,0)===true,T.orderIdx(d,0));
    const res=T.computeDay(d), a=row(res,'pa');
    t('cuadra en cero',res.sum===0,res.sum);
    t('A total +4 (hoyo+unidad+medal 2ª9+medal total)',a.total===4,a.total);
    const hh=T.h2h(d,'pa','pb');
    t('firstNet===0 (el birdie fue en la 2ª vuelta)',hh.firstNet===0,hh.firstNet);
    const ms=T.medalSeg(d,'pa','pb',Z,Z);
    t('medalSeg: 1ª9 empate, 2ª9 y total para A',ms.first.winner===null&&ms.second.winner==='a'&&ms.total.winner==='a',JSON.stringify(ms));
  }

  // ============ F4 · 9 hoyos ============
  sec('F4 nueve hoyos (medal se reduce a 1 segmento)');
  {
    const d=day({holes:9,playing:['pa','pb'],salidas:[['pa','pb']],
      scores:{pa:sc({gross:gross(null,true)}),pb:sc({gross:gross({0:5},true)})}});
    reset({players:[P('pa','Ana A'),P('pb','Beto B')],days:[d],currentDayId:d.id});
    t('playOrder tiene 9 hoyos',T.playOrder(d).length===9,T.playOrder(d).length);
    const al=T.allocate(2,d);
    t('allocate 9h: reparte SOLO en el front (idx1,idx5; idx9=0)',al[1]===1&&al[5]===1&&al[9]===0,JSON.stringify(al));
    const res=T.computeDay(d), a=row(res,'pa');
    const ms=T.medalSeg(d,'pa','pb',Z,Z);
    t('medalSeg 9h: solo el 1er segmento existe',ms.first!==null&&ms.second===null&&ms.total===null,JSON.stringify(ms));
    t('cuadra en cero',res.sum===0,res.sum);
    t('A total +2 (hoyo del bogey + medal del segmento)',a.total===2,a.total);
  }

  // ============ F5 · Doblar ============
  sec('F5 doblar (B pierde la 1ª vuelta y dobla la 2ª ×2)');
  {
    const d=day({playing:['pa','pb'],salidas:[['pa','pb']],doubles:{pb:{pa:true}},
      scores:{pa:sc({gross:gross({1:3})}),pb:sc({gross:gross({9:3,10:3})})}});
    reset({players:[P('pa','Ana A'),P('pb','Beto B')],days:[d],currentDayId:d.id});
    const res=T.computeDay(d), a=row(res,'pa'), b=row(res,'pb');
    t('cuadra en cero',res.sum===0,res.sum);
    t('A hoyos −3 (ganó 1 simple, perdió 2 dobles)',a.hoyos===-3,a.hoyos);
    t('A unidades −3 (1 simple vs 2 dobles)',a.unidades===-3,a.unidades);
    t('A medal −2 (+1ª9, −2ª9 doblada ×2, −total)',a.medal===-2,a.medal);
    t('B total +8, A −8',b.total===8&&a.total===-8,b.total+'/'+a.total);
    const hb=T.h2h(d,'pb','pa');
    t('h2h de B: doubled===true y firstNet −3 (hoyo+unidad+medal 1ª9: iba perdiendo)',hb.doubled===true&&hb.firstNet===-3,hb.firstNet);
  }

  // ============ F6 · Oyes ============
  sec('F6 oyes (solo par-3 y solo misma salida)');
  {
    const d=day({playing:['pa','pb','pc'],salidas:[['pa','pb'],['pc']],
      scores:{pa:sc({oyes:{3:1}}),pb:sc({oyes:{3:2}}),pc:sc({oyes:{3:1}})}});
    reset({players:[P('pa','Ana A'),P('pb','Beto B'),P('pc','Caro C')],days:[d],currentDayId:d.id});
    const res=T.computeDay(d);
    t('cuadra en cero',res.sum===0,res.sum);
    t('A oyes +1 (lugar 1 vs lugar 2, misma salida)',row(res,'pa').oyes===1,row(res,'pa').oyes);
    t('B oyes −1',row(res,'pb').oyes===-1,row(res,'pb').oyes);
    t('C oyes 0 (otra salida: NO se compara)',row(res,'pc').oyes===0,row(res,'pc').oyes);
  }

  // ============ F7 · Unidades: automáticas, manuales y peso en rayas ============
  sec('F7 unidades (auto birdie/eagle/holeout · manual reqPar · peso u.rayas)');
  {
    const d=day({playing:['pa','pb'],salidas:[['pa','pb']],scores:{pa:sc(),pb:sc()}});
    reset({players:[P('pa','Ana A'),P('pb','Beto B')],days:[d],currentDayId:d.id});
    const H=T.getState().courses[0].holes;
    t('eagle: 3 en par-5 (idx2)',JSON.stringify(T.autoUnits(3,2,2,H))==='["eagle"]',JSON.stringify(T.autoUnits(3,2,2,H)));
    t('birdie: 3 en par-4 (idx0)',JSON.stringify(T.autoUnits(3,0,2,H))==='["birdie"]',JSON.stringify(T.autoUnits(3,0,2,H)));
    t('holeout: metió sin puttear',JSON.stringify(T.autoUnits(4,0,0,H))==='["holeout"]',JSON.stringify(T.autoUnits(4,0,0,H)));
    t('birdie+holeout juntos',JSON.stringify(T.autoUnits(3,0,0,H))==='["birdie","holeout"]',JSON.stringify(T.autoUnits(3,0,0,H)));
    const sPar=sc({units:{0:['sandie']}}), sBogey=sc({gross:gross({0:5}),units:{0:['sandie']}});
    t('sandy válido con par',JSON.stringify(T.validManual(sPar,0,H))==='["sandie"]',JSON.stringify(T.validManual(sPar,0,H)));
    t('sandy INVÁLIDO con bogey (reqPar)',T.validManual(sBogey,0,H).length===0,JSON.stringify(T.validManual(sBogey,0,H)));
    // peso por u.rayas: birdie a 2 rayas
    const d2=day({playing:['pa','pb'],salidas:[['pa','pb']],scores:{pa:sc({gross:gross({0:3})}),pb:sc()}});
    const u2=JSON.parse(JSON.stringify(DEF.units)); u2.find(u=>u.id==='birdie').rayas=2;
    reset({players:[P('pa','Ana A'),P('pb','Beto B')],days:[d2],currentDayId:d2.id,units:u2});
    t('unitsOnHole pesa u.rayas (birdie×2)',T.unitsOnHole(d2,'pa',0)===2,T.unitsOnHole(d2,'pa',0));
    t('día con birdie×2 cuadra en cero',T.computeDay(d2).sum===0,T.computeDay(d2).sum);
  }

  // ============ F8 · Castigos: raya (paga a todos) vs trago (cuenta del 19) ============
  sec('F8 castigos (calaca 10+: tipo raya vs tipo trago)');
  {
    const mk=()=>day({playing:['pa','pb','pc'],salidas:[['pa','pb','pc']],
      scores:{pa:sc({gross:gross({0:10})}),pb:sc(),pc:sc()}});
    // tipo RAYA: paga 1 a cada rival
    const d1=mk(); const cast=JSON.parse(JSON.stringify(DEF.castigos)); cast.find(c=>c.id==='calaca').tipo='raya';
    reset({players:[P('pa','Ana A'),P('pb','Beto B'),P('pc','Caro C')],days:[d1],currentDayId:d1.id,castigos:cast});
    const r1=T.computeDay(d1), a1=row(r1,'pa');
    t('raya: cuadra en cero',r1.sum===0,r1.sum);
    t('raya: A castig −2 (paga a 2 rivales)',a1.castig===-2,a1.castig);
    t('raya: A total −8 (hoyo−2, medal−4, castigo−2)',a1.total===-8,a1.total);
    t('raya: B y C +4 c/u',row(r1,'pb').total===4&&row(r1,'pc').total===4,row(r1,'pb').total);
    // tipo TRAGO (default): va a la cuenta del 19, NO mueve dinero
    const d2=mk();
    reset({players:[P('pa','Ana A'),P('pb','Beto B'),P('pc','Caro C')],days:[d2],currentDayId:d2.id});
    const r2=T.computeDay(d2), a2=row(r2,'pa');
    t('trago: drinks[A].calaca===1',r2.drinks.pa.calaca===1,JSON.stringify(r2.drinks.pa));
    t('trago: castig 0 y total −6 (solo hoyo y medal)',a2.castig===0&&a2.total===-6,a2.castig+'/'+a2.total);
    t('trago: cuadra en cero',r2.sum===0,r2.sum);
  }

  // ============ F9 · seasonStats / careerStats (humo + racha) ============
  sec('F9 temporada y carrera (este fixture habría cazado el bug de inet)');
  {
    const d=day({playing:['pa','pb','pc'],salidas:[['pa','pb','pc']],
      scores:{pa:sc({gross:gross({0:3})}),pb:sc(),pc:sc()}});
    reset({players:[P('pa','Ana A'),P('pb','Beto B'),P('pc','Caro C')],days:[d],currentDayId:d.id});
    let ss=null, err=null; try{ ss=T.seasonStats(); }catch(e){ err=e.message; }
    t('seasonStats NO truena',err===null,err);
    t('A: 1 día jugado, pesos +160',ss&&ss.A.pa.days===1&&ss.A.pa.pesos===160,ss&&ss.A.pa.pesos);
    t('A: racha de viernes = 1 (ganó)',ss&&ss.A.pa.fridayStreak===1,ss&&ss.A.pa.fridayStreak);
    t('B: racha 0 (perdió)',ss&&ss.A.pb.fridayStreak===0,ss&&ss.A.pb.fridayStreak);
    let err2=null; try{ T.careerStats(); }catch(e){ err2=e.message; }
    t('careerStats NO truena',err2===null,err2);
  }

  // ============ F10 · Valor de raya por pareja ============
  sec('F10 rayaPairs (override $50 entre A y B)');
  {
    const d=day({playing:['pa','pb'],salidas:[['pa','pb']],scores:{pa:sc({gross:gross({0:3})}),pb:sc()}});
    reset({players:[P('pa','Ana A'),P('pb','Beto B')],days:[d],currentDayId:d.id,rayaPairs:{'pa|pb':50}});
    const res=T.computeDay(d), a=row(res,'pa');
    t('cuadra en cero',res.sum===0,res.sum);
    t('A: 4 rayas × $50 = $200',a.total===4&&a.pesos===200,a.total+'/'+a.pesos);
  }

  // ============ F11 · Fuzz: invariantes con scores pseudo-aleatorios ============
  sec('F11 fuzz (3 semillas · 4 jugadores · ventajas y doblada al azar)');
  {
    const lcg=s=>()=>((s=(s*1103515245+12345)&0x7fffffff)/0x7fffffff);
    [7,42,2026].forEach(seed=>{
      const rnd=lcg(seed), ri=(n)=>Math.floor(rnd()*n);
      const ids=['q1','q2','q3','q4'];
      const scores={}; ids.forEach(id=>{ const g=[]; for(let h=0;h<18;h++)g.push(3+ri(5)); // 3..7 → sin calaca
        const oy={}; [3,6,12,15].forEach(h=>{ if(rnd()<0.6) oy[h]=1+ri(2); });
        scores[id]=sc({gross:g,oyes:oy}); });
      const doubles={}; if(rnd()<0.7){ const x=ids[ri(4)]; let y=ids[ri(4)]; if(y===x)y=ids[(ids.indexOf(x)+1)%4]; doubles[x]={[y]:true}; }
      const vent={}; if(rnd()<0.8) vent['q1>q2']=1+ri(5); if(rnd()<0.8) vent['q3>q1']=1+ri(5); if(rnd()<0.5) vent['q4>q3']=1+ri(4);
      const d=day({playing:ids.slice(),salidas:[['q1','q2'],['q3','q4']],doubles,scores});
      reset({players:ids.map((id,i)=>P(id,'Jug '+(i+1))),days:[d],currentDayId:d.id,ventajas:vent});
      const res=T.computeDay(d);
      t('semilla '+seed+': cuadra en cero',res.sum===0,res.sum);
      let anti=true, buckets=true, h2hOk=true;
      for(let i=0;i<4;i++)for(let j=0;j<4;j++){ if(i!==j && pm(res,ids[i],ids[j])!==-pm(res,ids[j],ids[i])) anti=false; }
      res.rows.forEach(r=>{ if(r.total!==r.hoyos+r.unidades+r.medal+r.oyes+r.castig) buckets=false; });
      for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){ if(pm(res,ids[i],ids[j])!==T.h2h(d,ids[i],ids[j]).net) h2hOk=false; }
      t('semilla '+seed+': PM antisimétrica',anti);
      t('semilla '+seed+': total = suma de buckets',buckets);
      t('semilla '+seed+': PM coincide con h2h.net (sin castigos)',h2hOk);
      const sorted=[...res.rows].every((r,i,arr)=>i===0||arr[i-1].pesos>=r.pesos);
      t('semilla '+seed+': filas ordenadas por pesos',sorted);
    });
  }

  // ============ F12 · Apuestas apagadas (snapshot d.bets) ============
  sec('F12 gateo por apuesta (d.bets del snapshot manda)');
  {
    const allOn={hoyos:true,medal:true,unidades:true,oyes:true,doblar:true,castigos:true};
    // oyes+medal apagados: el birdie y los lugares no mueven ese dinero
    const d=day({playing:['pa','pb'],salidas:[['pa','pb']],bets:Object.assign({},allOn,{medal:false,oyes:false}),
      scores:{pa:sc({gross:gross({0:3}),oyes:{3:1}}),pb:sc({oyes:{3:2}})}});
    reset({players:[P('pa','Ana A'),P('pb','Beto B')],days:[d],currentDayId:d.id});
    const res=T.computeDay(d), a=row(res,'pa');
    t('medal OFF: bucket 0 (con birdie que ganaría 1ª9 y total)',a.medal===0,a.medal);
    t('oyes OFF: bucket 0 (con lugares capturados)',a.oyes===0,a.oyes);
    t('hoyos y unidades siguen: total +2',a.total===2,a.total);
    t('cuadra en cero',res.sum===0,res.sum);
    // doblar apagado: la doblada registrada NO multiplica
    const d2=day({playing:['pa','pb'],salidas:[['pa','pb']],bets:Object.assign({},allOn,{doblar:false}),
      doubles:{pb:{pa:true}},scores:{pa:sc(),pb:sc({gross:gross({9:3})})}});
    reset({players:[P('pa','Ana A'),P('pb','Beto B')],days:[d2],currentDayId:d2.id});
    const r2=T.computeDay(d2), b2=row(r2,'pb');
    t('doblar OFF: birdie 2ª vuelta vale ×1 (hoyo1+unid1+medal2 = +4, no +7)',b2.total===4,b2.total);
    t('doblar OFF: cuadra en cero',r2.sum===0,r2.sum);
    // castigos apagados: calaca no genera ni trago ni dinero
    const d3=day({playing:['pa','pb'],salidas:[['pa','pb']],bets:Object.assign({},allOn,{castigos:false}),
      scores:{pa:sc({gross:gross({0:10})}),pb:sc()}});
    const cast=JSON.parse(JSON.stringify(DEF.castigos)); cast.find(c=>c.id==='calaca').tipo='raya';
    reset({players:[P('pa','Ana A'),P('pb','Beto B')],days:[d3],currentDayId:d3.id,castigos:cast});
    const r3=T.computeDay(d3), a3=row(r3,'pa');
    t('castigos OFF: castig 0 y sin tragos (aunque calaca sea raya)',a3.castig===0&&Object.keys(r3.drinks.pa).length===0,a3.castig);
    t('castigos OFF: cuadra en cero',r3.sum===0,r3.sum);
  }

  // ============ F13 · Apuesta de la casa (plantilla evento-por-hoyo) ============
  sec('F13 apuesta custom: Víbora (3 putts paga 1 raya a todos)');
  {
    const vib={id:'vib1',name:'Víbora',emoji:'🐍',evento:'3putt',accion:'paga',alcance:'todos',rayas:1,dobla:true,on:true};
    const pu=Array(18).fill(2); pu[4]=3;   // A hace 3-putt en idx4
    const d=day({playing:['pa','pb','pc'],salidas:[['pa','pb','pc']],customBets:[vib],
      scores:{pa:sc({putts:pu}),pb:sc(),pc:sc()}});
    reset({players:[P('pa','Ana A'),P('pb','Beto B'),P('pc','Caro C')],days:[d],currentDayId:d.id});
    const res=T.computeDay(d), a=row(res,'pa');
    t('víbora: A paga 1 a cada quien (bucket −2)',a.vib1===-2,a.vib1);
    t('víbora: B y C +1',row(res,'pb').vib1===1&&row(res,'pc').vib1===1,row(res,'pb').vib1);
    t('víbora entra al total (A −2)',a.total===-2,a.total);
    t('cuadra en cero',res.sum===0,res.sum);

    reset({players:[P('pa','Ana'),P('pb','Beto'),P('pc','Caro')],days:[d],currentDayId:d.id});
    const res=T.computeDay(d);
    t('cuadra en cero',res.sum===0,res.sum);
    const hba=T.h2h(d,'pb','pa');
    t('pb (tarde) vs pa = +3: solo el 2º nueve (hoyo10 + birdie + medal back)',hba.net===3,hba.net);
    const ms=T.medalSeg(d,'pb','pa',Z,Z);
    t('medal de pb: 1er nueve y total NULL (le falta el front), 2º nueve cuenta',ms.first===null&&ms.second&&ms.second.winner==='a'&&ms.total===null,JSON.stringify({f:ms.first,s:ms.second,t:ms.total}));
    // validateDay: pb = skipped "no jugó la 1ª vuelta"; pc = issue incompleto (1ª v. a medias)
    const v=T.validateDay(d);
    t('pb en skipped como "no jugó la 1ª vuelta"',v.skipped.some(s=>/1ª vuelta/.test(s.msg)),JSON.stringify(v.skipped));
    t('pc (5 de 9 del front) sí es issue incompleto',v.issues.some(i=>/faltan/.test(i.msg)),JSON.stringify(v.issues));
    t('pb NO aparece como incompleto',!v.issues.some(i=>i.name===T.getState().players.find(p=>p.id==='pb').name && /faltan/.test(i.msg)),'');
  }

  window.__RESULTS__.ready=true;
  flush();
}
main().catch(e=>{ window.__RESULTS__.ready=true; window.__RESULTS__.fail++; window.__RESULTS__.fails.push('EXCEPCIÓN: '+e.message);
  line('fail','EXCEPCIÓN del harness: '+e.message+' — '+(e.stack||'').split('\n')[1]); flush(); });
</script>
